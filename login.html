<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vovu — Sign in</title>
  <link rel="icon" type="image/png" href="./VOVU LOGO OFICIAL.png">
  <link rel="stylesheet" href="./css/style.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/supabase-config.js"></script>
</head>
<body>
<div class="login-screen">

  <img src="./public/Welcome--Streamline-Dhaka.png"
       width="200" height="200"
       class="fade-up"
       loading="eager"
       style="object-fit:contain; margin-bottom:24px;"
       onerror="this.style.display='none'">

  <div class="wordmark fade-up-d1">
    <img src="./VOVU LOGO OFICIAL.png"
         width="44" height="44"
         style="object-fit:contain"
         onerror="this.style.display='none'">
    <span>Vovu</span>
  </div>

  <p class="tagline fade-up-d2">Plans that find you.</p>

  <div class="form-card fade-up-d3" id="login-form">
    <label for="email-input">School email</label>
    <input type="email" id="email-input"
           class="input"
           placeholder="you@university.edu"
           autocomplete="email">

    <div id="campus-confirm" class="campus-confirm hidden" style="margin-top:8px;">
      <span class="campus-dot"></span>
      <span id="campus-name-text"></span>
    </div>

    <p id="email-error" class="error-text hidden"></p>

    <p style="font-size:13px; color:var(--sage); margin-top:10px; margin-bottom:0; text-align:center;">
      No password needed — we'll email you a login link.
    </p>

    <button id="send-btn"
            class="btn-primary btn-full"
            style="margin-top:12px;"
            onclick="handleLogin()">
      <i data-lucide="mail"></i>
      Send magic link
    </button>
  </div>

  <div id="sent-state" class="sent-state hidden">
    <img src="./public/Enter-Your-Password--Streamline-Dhaka.png"
         width="200" height="200"
         loading="lazy"
         style="object-fit:contain; margin:0 auto;"
         onerror="this.style.display='none'">
    <h2>Check your inbox</h2>
    <p>We sent a link to <strong id="sent-email" style="color:var(--forest);"></strong></p>
    <p class="expiry">Expires in 15 minutes.</p>
  </div>

  <footer class="site-footer" style="margin-top:32px;">
    <div class="footer-inner">
      <div class="footer-grid">
        <div>
          <div class="footer-col-label">Company</div>
          <a href="./nosotros.html" class="footer-link">About</a>
          <a href="./blog.html" class="footer-link">Blog</a>
          <a href="./prensa.html" class="footer-link">Press</a>
        </div>
        <div>
          <div class="footer-col-label">Legal</div>
          <a href="./privacidad.html" class="footer-link">Privacy</a>
          <a href="./terminos.html" class="footer-link">Terms</a>
          <a href="./privacidad.html" class="footer-link">Cookies</a>
        </div>
        <div>
          <div class="footer-col-label">Support</div>
          <a href="./ayuda.html" class="footer-link">Help</a>
          <a href="mailto:hello@vovu.co" class="footer-link">Contact</a>
          <a href="./testimonios.html" class="footer-link">Testimonials</a>
        </div>
      </div>
      <div class="footer-bottom">
        <span class="footer-brand-text">Vovu</span>
        <span class="footer-tagline">© 2026 Vovu · Making campus less lonely</span>
      </div>
    </div>
  </footer>

</div>

<script src="./js/main.js?v=3"></script>
<script>lucide.createIcons();</script>
</body>
</html>
