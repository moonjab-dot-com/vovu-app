<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vovu — It's a match</title>
  <link rel="stylesheet" href="./css/style.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body style="background:var(--forest);">
<div class="match-screen">

  <img src="./public/Business-Dealsuccess--Streamline-Dhaka.png"
       width="200" height="200"
       class="fade-up"
       loading="eager"
       style="object-fit:contain;"
       onerror="this.style.display='none'">

  <p class="match-label fade-up-d1">IT'S A MATCH</p>

  <div class="reveal-card fade-up-d2">

    <div class="reveal-avatars">
      <div class="avatar-col">
        <div class="avatar avatar-you" style="width:64px;height:64px;font-size:22px;">Y</div>
        <span class="avatar-label">You</span>
      </div>
      <div style="align-self:center; color:var(--success); padding-bottom:20px;">
        <i data-lucide="heart-handshake" style="width:32px;height:32px;"></i>
      </div>
      <div class="avatar-col">
        <div class="avatar avatar-them" style="width:64px;height:64px;font-size:22px;" id="match-avatar">?</div>
        <span id="match-name">Alex</span>
      </div>
    </div>

    <div class="reveal-card-divider"></div>

    <div class="reveal-card-details">
      <p>
        <i data-lucide="map-pin"></i>
        Wiggin Street Coffee, back corner table
      </p>
      <p>
        <i data-lucide="clock"></i>
        3:15pm today
      </p>
      <p>
        <i data-lucide="mail"></i>
        alex@kenyon.edu
      </p>
    </div>

    <p class="reveal-card-footer">Last name never shared by Vovu.</p>
  </div>

  <a href="./feed.html" class="btn-butter fade-up-d3"
     style="margin-top:32px; height:52px; padding:0 28px; border-radius:12px;
            display:inline-flex; align-items:center; gap:8px;
            font-size:15px; font-weight:500; text-decoration:none;">
    Back to feed
    <i data-lucide="arrow-right"></i>
  </a>

</div>

<script src="./js/main.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
