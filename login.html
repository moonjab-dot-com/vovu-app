<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vovu — Sign in</title>
  <link rel="stylesheet" href="./css/style.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/supabase-config.js"></script>
</head>
<body>
<div class="login-screen">

  <img src="./public/Welcome--Streamline-Dhaka.png"
       width="200" height="200"
       class="fade-up"
       loading="eager"
       style="object-fit:contain; margin-bottom:24px;"
       onerror="this.style.display='none'">

  <div class="wordmark fade-up-d1">
    <img src="./VOVU LOGO OFICIAL.png"
         width="44" height="44"
         style="object-fit:contain"
         onerror="this.style.display='none'">
    <span>Vovu</span>
  </div>

  <p class="tagline fade-up-d2">Plans that find you.</p>

  <div class="form-card fade-up-d3" id="login-form">
    <label for="email-input">School email</label>
    <input type="email" id="email-input"
           class="input"
           placeholder="you@university.edu"
           autocomplete="email">

    <div id="campus-confirm" class="campus-confirm hidden" style="margin-top:8px;">
      <span class="campus-dot"></span>
      <span id="campus-name-text"></span>
    </div>

    <p id="email-error" class="error-text hidden"></p>

    <button id="send-btn"
            class="btn-primary btn-full"
            style="margin-top:16px;"
            onclick="handleLogin()">
      <i data-lucide="mail"></i>
      Send me a link
    </button>
  </div>

  <div id="sent-state" class="sent-state hidden">
    <img src="./public/Enter-Your-Password--Streamline-Dhaka.png"
         width="200" height="200"
         loading="lazy"
         style="object-fit:contain; margin:0 auto;"
         onerror="this.style.display='none'">
    <h2>Check your inbox</h2>
    <p>We sent a link to <strong id="sent-email" style="color:var(--forest);"></strong></p>
    <p class="expiry">Expires in 15 minutes.</p>
  </div>

  <a href="./onboarding.html" class="demo-link fade-up-d3">Skip for demo</a>

  <footer class="site-footer" style="margin-top:32px;">
    <div class="footer-inner">
      <div class="footer-grid">
        <div>
          <div class="footer-col-label">Company</div>
          <a href="#" class="footer-link">About</a>
          <a href="#" class="footer-link">Blog</a>
          <a href="#" class="footer-link">Careers</a>
        </div>
        <div>
          <div class="footer-col-label">Legal</div>
          <a href="#" class="footer-link">Privacy</a>
          <a href="#" class="footer-link">Terms</a>
          <a href="#" class="footer-link">Cookies</a>
        </div>
        <div>
          <div class="footer-col-label">Support</div>
          <a href="#" class="footer-link">Help center</a>
          <a href="#" class="footer-link">Contact</a>
          <a href="#" class="footer-link">Safety</a>
        </div>
      </div>
      <div class="footer-bottom">
        <span class="footer-brand-text">Vovu</span>
        <span class="footer-tagline">© 2025 Vovu · Making campus less lonely</span>
      </div>
    </div>
  </footer>

</div>

<script src="./js/main.js?v=3"></script>
<script>lucide.createIcons();</script>
</body>
</html>
