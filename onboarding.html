<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vovu — Your vibe profile</title>
  <link rel="stylesheet" href="./css/style.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/supabase-config.js"></script>
  <script src="./js/db.js"></script>
</head>
<body>

<!-- PROGRESS -->
<div class="ob-progress-track">
  <div class="progress-fill" id="ob-progress" style="width:4.5%"></div>
</div>

<!-- STEP COUNTER -->
<div class="ob-step-counter">
  <span id="ob-step-label">1 of 22</span>
</div>

<!-- STEP WRAPPER -->
<div class="ob-wrapper" id="ob-wrapper">
  <!-- JS renders each step here -->
</div>

<footer class="site-footer footer-with-nav">
  <div class="footer-inner">
    <div class="footer-grid">
      <div>
        <div class="footer-col-label">Company</div>
        <a href="#" class="footer-link">About</a>
        <a href="#" class="footer-link">Blog</a>
        <a href="#" class="footer-link">Careers</a>
      </div>
      <div>
        <div class="footer-col-label">Legal</div>
        <a href="#" class="footer-link">Privacy</a>
        <a href="#" class="footer-link">Terms</a>
        <a href="#" class="footer-link">Cookies</a>
      </div>
      <div>
        <div class="footer-col-label">Support</div>
        <a href="#" class="footer-link">Help center</a>
        <a href="#" class="footer-link">Contact</a>
        <a href="#" class="footer-link">Safety</a>
      </div>
    </div>
    <div class="footer-bottom">
      <span class="footer-brand-text">Vovu</span>
      <span class="footer-tagline">© 2025 Vovu · Making campus less lonely</span>
    </div>
  </div>
</footer>

<!-- FIXED BOTTOM NAV -->
<div class="ob-bottom-nav">
  <button class="btn-ghost" id="ob-back" onclick="obBack()" style="visibility:hidden;">
    <i data-lucide="arrow-left"></i> Back
  </button>
  <button class="btn-primary" id="ob-next" onclick="obNext()" disabled>
    Continue <i data-lucide="arrow-right"></i>
  </button>
</div>

<script src="./js/matching.js"></script>
<script src="./js/onboarding.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
